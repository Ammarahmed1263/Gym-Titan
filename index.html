<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Titan</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/shared.css" />

    <script src="js/shared.js" defer></script>
    <script src="js/app.js" defer></script>

    <link rel="manifest" href="manifest.json" />

    <!-- for ios -->
    <link rel="apple-touch-icon" href="images/icons/icon-48x48.png" />
    <meta name="apple-mobile-web-app-status-bar" content="#0a0a0a" />

    <meta name="theme_color" content="#1a1a1a" />
  </head>
  <body>
    <main class="main-content">
      <section class="calculator-card">
        <h2>One-Rep Max(1RM) Estimator</h2>

        <form id="rm-form">
          <input
            type="number"
            id="weight-input"
            placeholder="Weight (kg/lbs)"
            min="1"
            required
          />
          <input
            type="number"
            id="reps-input"
            placeholder="Reps"
            min="1"
            required
          />
          <button type="submit">Calculate</button>
        </form>
        <div id="rm-result" class="result-display">
            Result will appear here...
        </div>
      </section>
    </main>
  </body>
</html>
